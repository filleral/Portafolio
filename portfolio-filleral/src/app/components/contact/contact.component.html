<section class="section contact" id="contact">
  <div class="container">
    <div class="section__header">
      <span class="eyebrow">Hablemos</span>
      <h2>¿Tienes un proyecto?</h2>
      <div class="divider"></div>
    </div>
    <div class="contact__layout">
      <div class="contact__info">
        <p class="contact__intro">
          Estoy abierto a nuevas oportunidades, proyectos freelance o simplemente
          a conversar sobre tecnología. Escríbeme y respondo en menos de 24 horas.
        </p>
        <div class="contact__items">
          <a href="mailto:filleral19@gmail.com" class="contact__item">
            <div class="contact__item-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
            </div>
            <div>
              <span class="contact__item-label">Email</span>
              <span class="contact__item-value">filleral19&#64;gmail.com</span>
            </div>
          </a>
          <a href="tel:+573219114191" class="contact__item">
            <div class="contact__item-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg>
            </div>
            <div>
              <span class="contact__item-label">Teléfono</span>
              <span class="contact__item-value">+57 321 9114191</span>
            </div>
          </a>
          <a href="https://www.linkedin.com/in/filleral-mahecha" target="_blank" rel="noopener" class="contact__item">
            <div class="contact__item-icon">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6zM2 9h4v12H2z"/><circle cx="4" cy="4" r="2"/></svg>
            </div>
            <div>
              <span class="contact__item-label">LinkedIn</span>
              <span class="contact__item-value">Filleral Mahecha</span>
            </div>
          </a>
          <a href="https://github.com/Filleral" target="_blank" rel="noopener" class="contact__item">
            <div class="contact__item-icon">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 00-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0020 4.77 5.07 5.07 0 0019.91 1S18.73.65 16 2.48a13.38 13.38 0 00-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 005 4.77a5.44 5.44 0 00-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 009 18.13V22"/></svg>
            </div>
            <div>
              <span class="contact__item-label">GitHub</span>
              <span class="contact__item-value">github.com/filleral</span>
            </div>
          </a>
        </div>
      </div>
      <form class="contact__form" (ngSubmit)="onSubmit()" #contactForm="ngForm">
        <div class="contact__field">
          <label for="name">Nombre</label>
          <input id="name" type="text" placeholder="Tu nombre" [(ngModel)]="form.name" name="name" required />
        </div>
        <div class="contact__field">
          <label for="email">Email</label>
          <input id="email" type="email" placeholder="tu@email.com" [(ngModel)]="form.email" name="email" required />
        </div>
        <div class="contact__field">
          <label for="message">Mensaje</label>
          <textarea id="message" rows="5" placeholder="Cuéntame sobre tu proyecto..." [(ngModel)]="form.message" name="message" required></textarea>
        </div>
        <button type="submit" class="btn btn--primary contact__submit" [disabled]="contactForm.invalid">
          Enviar mensaje
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </form>
    </div>
  </div>
</section>
