<section class="section projects" id="projects">
  <div class="container">
    <div class="section__header">
      <span class="eyebrow">Portafolio</span>
      <h2>Proyectos Destacados</h2>
      <div class="divider"></div>
    </div>
    <div class="projects__grid">
      <article class="project-card" *ngFor="let p of projects; let i = index">
        <div class="project-card__header">
          <span class="project-card__category">{{ p.category }}</span>
          <div class="project-card__links">
            <a *ngIf="p.repo" [href]="p.repo" target="_blank" rel="noopener" aria-label="Repositorio">
              <svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 00-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0020 4.77 5.07 5.07 0 0019.91 1S18.73.65 16 2.48a13.38 13.38 0 00-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 005 4.77a5.44 5.44 0 00-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 009 18.13V22"/></svg>
            </a>
            <a *ngIf="p.link" [href]="p.link" target="_blank" rel="noopener" aria-label="Ver proyecto">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/></svg>
            </a>
          </div>
        </div>
        <h3 class="project-card__title">{{ p.title }}</h3>
        <p class="project-card__desc">{{ p.description }}</p>
        <div class="project-card__tech">
          <span *ngFor="let t of p.tech">{{ t }}</span>
        </div>
      </article>
    </div>
  </div>
</section>
